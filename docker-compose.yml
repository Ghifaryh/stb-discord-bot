version: '3.8'

services:
  stb-bot:
    build: .
    container_name: stb-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /:/hostfs:ro
      - /mnt/ssd:/mnt/ssd:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
