services:
  stb-bot:
    image: stb-bot:latest
    container_name: stb-discord-bot
    restart: unless-stopped
    # 1. Add Linux Capabilities to allow unprivileged raw ICMP sockets
    cap_add:
      - NET_ADMIN
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /:/hostfs:ro
      - /mnt/ssd:/mnt/ssd:ro
      - /mnt/storage:/mnt/storage:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
